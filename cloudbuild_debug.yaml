steps:
  - name: 'gcr.io/cloud-builders/bash'
    args: ['-c', 'pwd && ls -la && find . -maxdepth 2 -type f | sort']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cyberstadium-ai:latest', '.']
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/cyberstadium-ai:latest'
