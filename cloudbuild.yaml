# Cloud Build configuration to build container and deploy to Cloud Run
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cyberstadium-ai:$SHORT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cyberstadium-ai:$SHORT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cyberstadium-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/cyberstadium-ai:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

substitutions:
  _REGION: 'us-central1'

images:
  - 'gcr.io/$PROJECT_ID/cyberstadium-ai:$SHORT_SHA'
